<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Beans - Apply Now</title>
    <link rel="stylesheet" href="/form.css">
</head>

<body>

<header>
    <div class="logo-area">
        <a href="index.html">
            <img class="logo" src="../assets/Company-logo.png" alt="company logo">
        </a>
        <span class="logo-text">Hot Beans</span>
    </div>

    <nav>
        <ul class="navbar">
            <li><a href="index.html"><button class="nav-btn">Home</button></a></li>
            <li><a href="company.html"><button class="nav-btn">Company</button></a></li>
            <li><a href="qualifications.html"><button class="nav-btn">Qualifications</button></a></li>
            <li><a href="our staff.html"><button class="nav-btn">Our Staff</button></a></li>
            <li><a href="course.html"><button class="nav-btn">Course</button></a></li>
            <li><a href="apply-now.html" class="apply-top-btn active">Apply Now</a></li>
        </ul>
    </nav>
</header>

<section class="apply-section">
    <h1 class="apply-title">Apply Now</h1>
    <p class="apply-subtitle">Fill out the form below to apply for a position at Hot Beans.</p>

    <form id="applyForm" class="apply-form" action="https://formsubmit.co/abtinmajidavi@gmail.com" method="POST">

        <!-- REQUIRED FOR FORMSUBMIT -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_subject" value="New Hot Beans Application">

        <label>Full Name</label>
        <input type="text" id="name" name="Full Name" placeholder="Enter your full name" required>

        <label>Email Address</label>
        <input type="email" id="email" name="Email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="text" id="phone" name="Phone Number" placeholder="Enter your phone number" required>

        <label>Job Role</label>
        <select id="role" name="Job Role" required>
            <option value="">Select a role...</option>
            <option value="Front-End Developer">Front-End Developer</option>
            <option value="Back-End Developer">Back-End Developer</option>
            <option value="UI/UX Designer">UI/UX Designer</option>
            <option value="Junior Developer">Junior Developer</option>
            <option value="QA Tester">QA Tester</option>
            <option value="Content Writer">Content Writer</option>
        </select>

        <label>Why do you want to join Hot Beans?</label>
        <textarea id="message" name="Message" placeholder="Tell us why you want to join..." required></textarea>

        <button type="submit" class="submit-btn">Submit Application</button>

        <p id="formMessage" class="form-message"></p>
    </form>
</section>

<script src="Form.js"></script>

</body>
</html>
